name: Run Tests

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0

        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: bankaccountsystem_test

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests

        env:
          ENV: ci

          DB_USER: root
          DB_PASSWORD: testpassword

          DB_HOST: mysql
          DB_PORT: 3306

          TEST_DB_NAME: bankaccountsystem_test

          SECRET_KEY: testsecretkey
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30

        run: |
          python -m pytest -v