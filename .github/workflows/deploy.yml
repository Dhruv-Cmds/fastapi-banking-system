name: Deploy to VPS

on:

  push:

    branches:

      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Deploy over SSH

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          
          script: |
            cd /opt/apps/fastapi-banking-system
            git fetch origin main
            git reset --hard origin/main
            sudo docker restart banking-api || true
            sudo docker restart banking-frontend || true