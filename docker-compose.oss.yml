services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${"MYSQL_ROOT_PASSWORD"}
      MYSQL_DATABASE: ${"DB_NAME"}
      MYSQL_USER: ${"DB_USER"}
      MYSQL_PASSWORD: ${"DB_PASSWORD"}
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  banking-api:
    container_name: banking-api
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app:Z
    env_file:
      - ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    networks:
      - shared-network

  banking-frontend:
    container_name: banking-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:Z
      - /app/node_modules
    depends_on:
      - banking-api
    restart: always
    networks:
      - shared-network
      
volumes:
  mysql-data:
  redis-data: