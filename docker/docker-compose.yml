services:
  banking-api:

    container_name: banking-api

    build:
      context: ..
      dockerfile: docker/Dockerfile
      
    ports:
      - "8000:8000"

    volumes:
      - ..:/app:Z

    depends_on:
      - banking-db

    env_file:
      - .env

    environment:
      ENV: docker 

    restart: always

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  banking-frontend:

    container_name: banking-frontend

    build:
      context: ../frontend

    ports:
      - "5173:5173"

    volumes:
      - ../frontend:/app:Z
      - /app/node_modules

    depends_on:
      - banking-api

    restart: always

  banking-db:

    container_name: banking-db

    image: mysql:8.0

    restart: always

    env_file:
      - .env

    environment:
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
        MYSQL_DATABASE: ${DB_NAME}
        MYSQL_USER: ${DB_USER}
        MYSQL_PASSWORD: ${DB_PASSWORD}

    ports:
      - "3008:3306"
      
    volumes:
      - ./databases/banking:/var/lib/mysql:Z